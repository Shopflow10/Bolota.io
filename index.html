<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blob Arena</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:#0b0f1a;
}

canvas{
position:fixed;
top:0;
left:0;
}

#hud{
position:fixed;
top:15px;
left:15px;
color:white;
z-index:5;
font-size:18px;
background:rgba(0,0,0,0.4);
padding:10px 15px;
border-radius:14px;
backdrop-filter:blur(5px);
}

#joystick{
position:fixed;
bottom:40px;
left:40px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.08);
border:2px solid rgba(255,255,255,0.1);
z-index:10;
}

#stick{
position:absolute;
width:55px;
height:55px;
left:32px;
top:32px;
border-radius:50%;
background:#6d7cff;
}
</style>
</head>

<body>

<div id="hud">
Tamanho: <span id="mass">10</span>
</div>

<canvas id="game"></canvas>

<div id="joystick">
<div id="stick"></div>
</div>

<script>

const canvas = document.getElementById('game')
const ctx = canvas.getContext('2d')

canvas.width = innerWidth
canvas.height = innerHeight

const world = {
width:5000,
height:5000
}

const player = {
x:2500,
y:2500,
radius:35,
speed:5,
color:'#6d7cff'
}

const foods = []

for(let i=0;i<600;i++){
foods.push({
x:Math.random()*world.width,
y:Math.random()*world.height,
radius:6,
color:`hsl(${Math.random()*360},80%,60%)`
})
}

const cam = {
x:0,
y:0
}

const joy = {
active:false,
dx:0,
dy:0
}

const joystick = document.getElementById('joystick')
const stick = document.getElementById('stick')

let joyStartX=0
let joyStartY=0

joystick.addEventListener('touchstart',e=>{
joy.active=true
const t=e.touches[0]
joyStartX=t.clientX
joyStartY=t.clientY
})

window.addEventListener('touchmove',e=>{
if(!joy.active)return

const t=e.touches[0]

joy.dx=t.clientX-joyStartX
joy.dy=t.clientY-joyStartY

const dist=Math.hypot(joy.dx,joy.dy)

if(dist>40){
joy.dx=(joy.dx/dist)*40
joy.dy=(joy.dy/dist)*40
}

stick.style.transform=`translate(${joy.dx}px,${joy.dy}px)`
})

window.addEventListener('touchend',()=>{
joy.active=false
joy.dx=0
joy.dy=0
stick.style.transform='translate(0px,0px)'
})

function update(){

player.x += joy.dx*0.12
player.y += joy.dy*0.12

player.x=Math.max(player.radius,Math.min(world.width-player.radius,player.x))
player.y=Math.max(player.radius,Math.min(world.height-player.radius,player.y))

foods.forEach((f,index)=>{
const d=Math.hypot(player.x-f.x,player.y-f.y)

if(d < player.radius+f.radius){
foods.splice(index,1)
player.radius += 0.2
}
})

cam.x=player.x-canvas.width/2
cam.y=player.y-canvas.height/2

mass.innerText=Math.floor(player.radius)
}

function drawGrid(){
ctx.strokeStyle='rgba(255,255,255,0.04)'

for(let x=0;x<world.width;x+=80){
ctx.beginPath()
ctx.moveTo(x-cam.x,-cam.y)
ctx.lineTo(x-cam.x,world.height-cam.y)
ctx.stroke()
}

for(let y=0;y<world.height;y+=80){
ctx.beginPath()
ctx.moveTo(-cam.x,y-cam.y)
ctx.lineTo(world.width-cam.x,y-cam.y)
ctx.stroke()
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle='#0b0f1a'
ctx.fillRect(0,0,canvas.width,canvas.height)

drawGrid()

foods.forEach(f=>{
ctx.beginPath()
ctx.fillStyle=f.color
ctx.arc(f.x-cam.x,f.y-cam.y,f.radius,0,Math.PI*2)
ctx.fill()
})

ctx.beginPath()
ctx.fillStyle=player.color
ctx.shadowBlur=30
ctx.shadowColor=player.color
ctx.arc(player.x-cam.x,player.y-cam.y,player.radius,0,Math.PI*2)
ctx.fill()
ctx.shadowBlur=0
}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

loop()

window.addEventListener('resize',()=>{
canvas.width=innerWidth
canvas.height=innerHeight
})

</script>

</body>
</html>
