<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit Rush</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #050816;
      touch-action: none;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      background: radial-gradient(circle at center, #111827, #030712);
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      z-index: 10;
    }

    #leaderboard {
      position: fixed;
      top: 10px;
      right: 10px;
      color: white;
      background: rgba(0,0,0,0.4);
      padding: 10px;
      border-radius: 12px;
      z-index: 10;
    }

    #joystick {
      position: fixed;
      bottom: 30px;
      left: 30px;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      z-index: 20;
    }

    #stick {
      position: absolute;
      width: 50px;
      height: 50px;
      background: white;
      border-radius: 50%;
      left: 30px;
      top: 30px;
    }
  </style>
</head>
<body>

<div id="hud">
  <h1 class="text-2xl font-bold">Orbit Rush</h1>
  <p id="score">Tamanho: 20</p>
</div>

<div id="leaderboard">
  <h2 class="font-bold mb-2">Ranking</h2>
  <p>1. Você</p>
</div>

<div id="joystick">
  <div id="stick"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const world = {
  width: 4000,
  height: 4000
};

const player = {
  x: world.width / 2,
  y: world.height / 2,
  radius: 20,
  speed: 5,
  color: '#00ffff',
  vx: 0,
  vy: 0
};

const foods = [];

for(let i = 0; i < 700; i++) {
  foods.push({
    x: Math.random() * world.width,
    y: Math.random() * world.height,
    radius: 6,
    color: `hsl(${Math.random()*360},100%,60%)`
  });
}

function drawGrid(cameraX, cameraY) {
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  for(let x = 0; x < world.width; x += 80) {
    ctx.beginPath();
    ctx.moveTo(x - cameraX, -cameraY);
    ctx.lineTo(x - cameraX, world.height - cameraY);
    ctx.stroke();
  }

  for(let y = 0; y < world.height; y += 80) {
    ctx.beginPath();
    ctx.moveTo(-cameraX, y - cameraY);
    ctx.lineTo(world.width - cameraX, y - cameraY);
    ctx.stroke();
  }
}

function drawPlayer(cameraX, cameraY) {
  ctx.beginPath();
  ctx.arc(player.x - cameraX, player.y - cameraY, player.radius, 0, Math.PI * 2);
  ctx.fillStyle = player.color;
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#00ffff';
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawFoods(cameraX, cameraY) {
  foods.forEach(food => {
    ctx.beginPath();
    ctx.arc(food.x - cameraX, food.y - cameraY, food.radius, 0, Math.PI * 2);
    ctx.fillStyle = food.color;
    ctx.fill();
  });
}

function update() {
  player.x += player.vx;
  player.y += player.vy;

  if(player.x < player.radius) player.x = player.radius;
  if(player.y < player.radius) player.y = player.radius;
  if(player.x > world.width - player.radius) player.x = world.width - player.radius;
  if(player.y > world.height - player.radius) player.y = world.height - player.radius;

  for(let i = foods.length - 1; i >= 0; i--) {
    const food = foods[i];
    const dx = player.x - food.x;
    const dy = player.y - food.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if(dist < player.radius) {
      foods.splice(i, 1);
      player.radius += 0.15;
      document.getElementById('score').innerText = 'Tamanho: ' + Math.floor(player.radius);
    }
  }
}

function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cameraX = player.x - canvas.width / 2;
  const cameraY = player.y - canvas.height / 2;

  drawGrid(cameraX, cameraY);
  drawFoods(cameraX, cameraY);
  drawPlayer(cameraX, cameraY);

  update();

  requestAnimationFrame(gameLoop);
}

gameLoop();

const joystick = document.getElementById('joystick');
const stick = document.getElementById('stick');

let dragging = false;

joystick.addEventListener('touchstart', () => {
  dragging = true;
});

window.addEventListener('touchend', () => {
  dragging = false;
  stick.style.left = '30px';
  stick.style.top = '30px';
  player.vx = 0;
  player.vy = 0;
});

window.addEventListener('touchmove', (e) => {
  if(!dragging) return;

  const touch = e.touches[0];
  const rect = joystick.getBoundingClientRect();

  const x = touch.clientX - rect.left - 55;
  const y = touch.clientY - rect.top - 55;

  const dist = Math.min(Math.sqrt(x*x + y*y), 35);
  const angle = Math.atan2(y, x);

  const stickX = Math.cos(angle) * dist;
  const stickY = Math.sin(angle) * dist;

  stick.style.left = (stickX + 30) + 'px';
  stick.style.top = (stickY + 30) + 'px';

  player.vx = Math.cos(angle) * player.speed;
  player.vy = Math.sin(angle) * player.speed;
});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
