<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blob Arena X</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{overflow:hidden;background:#070b14}
canvas{position:fixed;top:0;left:0}

#hud{
position:fixed;
top:15px;
left:15px;
color:white;
z-index:5;
padding:12px;
border-radius:16px;
background:rgba(0,0,0,.4);
backdrop-filter:blur(6px)
}

#leaderboard{
position:fixed;
top:15px;
right:15px;
color:white;
z-index:5;
padding:12px;
width:170px;
border-radius:16px;
background:rgba(0,0,0,.4);
backdrop-filter:blur(6px)
}

#minimap{
position:fixed;
right:20px;
bottom:20px;
width:140px;
height:140px;
border-radius:14px;
background:rgba(0,0,0,.5);
border:2px solid rgba(255,255,255,.1);
z-index:6;
}

#joystick{
position:fixed;
bottom:35px;
left:35px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.08);
border:2px solid rgba(255,255,255,.1);
z-index:10;
}

#stick{
position:absolute;
width:55px;
height:55px;
left:32px;
top:32px;
border-radius:50%;
background:#4f7cff;
}

#splitBtn{
position:fixed;
bottom:60px;
right:40px;
width:90px;
height:90px;
border:none;
border-radius:50%;
font-size:22px;
background:#4f7cff;
color:white;
z-index:10;
box-shadow:0 0 30px #4f7cff;
}
</style>
</head>

<body>

<div id="hud">
<div>Nick: Player</div>
<div>Tamanho: <span id="mass">35</span></div>
<div>FPS: <span id="fps">0</span></div>
</div>

<div id="leaderboard">
<h3>TOP</h3>
<div>1. Shadow</div>
<div>2. Nova</div>
<div>3. Ghost</div>
<div>4. Blaze</div>
<div>5. Você</div>
</div>

<canvas id="game"></canvas>
<canvas id="minimap"></canvas>

<div id="joystick">
<div id="stick"></div>
</div>

<button id="splitBtn">⚡</button>

<script>

const canvas=document.getElementById('game')
const ctx=canvas.getContext('2d')

canvas.width=innerWidth
canvas.height=innerHeight

const minimap=document.getElementById('minimap')
const mctx=minimap.getContext('2d')

const world={
width:6000,
height:6000
}

const player={
x:3000,
y:3000,
radius:35,
color:'#4f7cff'
}

const bots=[]

for(let i=0;i<15;i++){
bots.push({
x:Math.random()*world.width,
y:Math.random()*world.height,
radius:25+Math.random()*20,
color:`hsl(${Math.random()*360},80%,60%)`,
vx:(Math.random()-.5)*2,
vy:(Math.random()-.5)*2
})
}

const foods=[]

for(let i=0;i<1200;i++){
foods.push({
x:Math.random()*world.width,
y:Math.random()*world.height,
r:5,
c:`hsl(${Math.random()*360},90%,60%)`
})
}

const cam={x:0,y:0}

const joy={dx:0,dy:0,active:false}

const joystick=document.getElementById('joystick')
const stick=document.getElementById('stick')

let sx=0
let sy=0

joystick.addEventListener('touchstart',e=>{
joy.active=true
sx=e.touches[0].clientX
sy=e.touches[0].clientY
})

window.addEventListener('touchmove',e=>{
if(!joy.active)return

let dx=e.touches[0].clientX-sx
let dy=e.touches[0].clientY-sy

const dist=Math.hypot(dx,dy)

if(dist>40){
dx=(dx/dist)*40
dy=(dy/dist)*40
}

joy.dx=dx
joy.dy=dy

stick.style.transform=`translate(${dx}px,${dy}px)`
})

window.addEventListener('touchend',()=>{
joy.active=false
joy.dx=0
joy.dy=0
stick.style.transform='translate(0px,0px)'
})

splitBtn.onclick=()=>{
player.radius=Math.max(20,player.radius-5)
}

function update(){

player.x+=joy.dx*0.14
player.y+=joy.dy*0.14

foods.forEach((f,i)=>{
const d=Math.hypot(player.x-f.x,player.y-f.y)
if(d<player.radius+f.r){
foods.splice(i,1)
player.radius+=0.15
}
})

bots.forEach(b=>{
b.x+=b.vx
b.y+=b.vy

if(b.x<0||b.x>world.width)b.vx*=-1
if(b.y<0||b.y>world.height)b.vy*=-1
})

cam.x=player.x-canvas.width/2
cam.y=player.y-canvas.height/2

mass.innerText=Math.floor(player.radius)
}

function drawGrid(){
ctx.strokeStyle='rgba(255,255,255,.03)'

for(let x=0;x<world.width;x+=90){
ctx.beginPath()
ctx.moveTo(x-cam.x,-cam.y)
ctx.lineTo(x-cam.x,world.height-cam.y)
ctx.stroke()
}

for(let y=0;y<world.height;y+=90){
ctx.beginPath()
ctx.moveTo(-cam.x,y-cam.y)
ctx.lineTo(world.width-cam.x,y-cam.y)
ctx.stroke()
}
}

function draw(){

ctx.fillStyle='#070b14'
ctx.fillRect(0,0,canvas.width,canvas.height)

drawGrid()

foods.forEach(f=>{
ctx.beginPath()
ctx.fillStyle=f.c
ctx.arc(f.x-cam.x,f.y-cam.y,f.r,0,Math.PI*2)
ctx.fill()
})

bots.forEach(b=>{
ctx.beginPath()
ctx.fillStyle=b.color
ctx.shadowBlur=20
ctx.shadowColor=b.color
ctx.arc(b.x-cam.x,b.y-cam.y,b.radius,0,Math.PI*2)
ctx.fill()
})

ctx.beginPath()
ctx.fillStyle=player.color
ctx.shadowBlur=40
ctx.shadowColor=player.color
ctx.arc(player.x-cam.x,player.y-cam.y,player.radius,0,Math.PI*2)
ctx.fill()
ctx.shadowBlur=0
}

function drawMiniMap(){

mctx.clearRect(0,0,140,140)

mctx.fillStyle='#0d1320'
mctx.fillRect(0,0,140,140)

mctx.fillStyle='white'
mctx.beginPath()
mctx.arc(
(player.x/world.width)*140,
(player.y/world.height)*140,
4,0,Math.PI*2)
mctx.fill()
}

let last=performance.now()
let frames=0

function loop(now){

frames++
if(now-last>=1000){
fps.innerText=frames
frames=0
last=now
}

update()
draw()
drawMiniMap()

requestAnimationFrame(loop)
}

requestAnimationFrame(loop)

window.addEventListener('resize',()=>{
canvas.width=innerWidth
canvas.height=innerHeight
})

</script>

</body>
</html>
